<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexaLend| Asistente Interno</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-logo">N</div>
          <div class="brand-text">
            <h1>NexaLend</h1>
            <span>Asistente de documentos internos ¡NO PROPORCIONAR DATOS PERSONALES!</span>
          </div>
        </div>
      </header>

      <main class="chat-container" id="chatContainer">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">💬</div>
          <p>Preguntame lo que necesites saber sobre NexaLend.</p>
          <div class="suggestions">
            <button
              class="suggestion-chip"
              data-q="¿Qué es Nexalend?"
            >
              ¿Qué es NexaLend?
            </button>
            <button
              class="suggestion-chip"
              data-q="¿Cuáles son las principales definiciones de la POLÍTICA DE PRIVACIDAD Y PROTECCIÓN DE DATOS?
"
            >
              Principales definiciones
            </button>
            <button
              class="suggestion-chip"
              data-q=" ¿En qué principios se basa la estrategia de seguridad de NexaLend? "
            >
              ¿En qué se basa nuestra estrategia de seguridad?
            </button>
          </div>
        </div>

        <div id="chat" class="chat"></div>
      </main>

      <footer class="input-bar">
        <form id="chatForm" autocomplete="off">
          <input
            type="text"
            id="pregunta"
            placeholder="Escribí tu pregunta..."
            required
          />
          <button type="submit" id="sendBtn">Enviar</button>
        </form>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
